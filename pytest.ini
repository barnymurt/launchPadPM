[pytest]
# Pytest configuration for Scrum Team AI Agents Framework

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=agents
    --cov=config
    --cov=governance
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-fail-under=80
    -W ignore::DeprecationWarning

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    agent: Agent-specific tests

# Coverage options
[coverage:run]
source = agents,config,governance
omit = 
    */tests/*
    */test_*.py
    */__pycache__/*
    */example_*.py
    */demo_*.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
